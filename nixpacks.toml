[env]
  NIXPACKS_PHP_VERSION = "8.4"
  LARAVEL_BYPASS_ENV_CHECK = "1"

[phases.setup]
  # Force the Linux OS to install Python 3 and pip alongside PHP
  aptPkgs = ["python3", "python3-pip"]

[phases.install]
  cmds = [
    "composer install --no-dev --optimize-autoloader",
    "python3 -m pip install pandas joblib scikit-learn --break-system-packages"
  ]

[phases.build]
  cmds = [
    "php artisan optimize:clear",
    "php artisan config:cache",
    "php artisan route:cache"
  ]

[phases.start]
  cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"